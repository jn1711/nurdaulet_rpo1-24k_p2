{% extends 'base.html' %}
{% block title %}Регистрация{% endblock %}

{% block content %}
<style>
    form input, form textarea {
        width: 100%;
        padding: 12px;
        border: 1px solid #dee2e6;
        border-radius: 8px;
        margin-bottom: 20px;
        background-color: #f8f9fa;
    }
    form input:focus, form textarea:focus {
        border-color: #dc3545;
        outline: none;
        background-color: #fff;
    }
    label {
        font-weight: 600;
        margin-bottom: 8px;
        display: block;
        color: #495057;
    }
    .helptext {
        font-size: 13px;
        color: #6c757d;
        margin-top: -15px;
        margin-bottom: 20px;
        display: block;
    }
</style>

<div class="row justify-content-center mt-4 mb-5">
    <div class="col-md-5">
        <div class="card border-0 shadow-sm rounded-4">
            <div class="card-body p-5">
                <h2 class="fw-bold mb-4">Регистрация</h2>

                {% if form.non_field_errors %}
                    <div class="alert alert-danger">
                        {% for error in form.non_field_errors %}
                            <p>{{ error }}</p>
                        {% endfor %}
                    </div>
                {% endif %}

                <form method="post" novalidate>
                    {% csrf_token %}
                    {{ form.as_p }}

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-danger btn-lg rounded-3">Зарегистрироваться</button>
                    </div>
                </form>

                <hr class="my-4">
                <p class="text-center text-muted">
                    Уже есть аккаунт? <a href="{% url 'login' %}" class="text-danger fw-bold text-decoration-none">Войти</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
